version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DEBUG=True
      - LOG_LEVEL=DEBUG
    depends_on:
      - redis
    networks:
      - sre-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - sre-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    networks:
      - sre-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "6831:6831/udp"
      - "16686:16686"
    networks:
      - sre-network

networks:
  sre-network:
    driver: bridge
