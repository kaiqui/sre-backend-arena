# docker-compose para teste de carga local — NÃO usar em entrega final (K8s only)
# Budget total respeitado: 1.5 CPU + 350MB RAM
#
#   nginx  : 0.10 CPU  +  32MB
#   app x2 : 0.70 CPU  + 159MB cada
#   ─────────────────────────────
#   TOTAL  : 1.50 CPU  + 350MB  ✓

services:

  # ─────────────────────────────────────────────────────────────
  # Load Balancer
  # ─────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 32M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health/live"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ─────────────────────────────────────────────────────────────
  # Application — 2 réplicas (mínimo do challenge)
  # ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Substitui o CMD do Dockerfile: sem ddtrace (overhead) + uvloop/httptools via [standard]
    command: >
      uvicorn src.main:app
        --host 0.0.0.0
        --port 8000
        --workers 2
        --loop uvloop
        --http httptools
        --no-access-log
    env_file: .env
    environment:
      ENVIRONMENT: development
      # Desliga APM para não consumir CPU no teste de carga
      DD_TRACE_ENABLED: "false"
      DD_DOGSTATSD_PORT: "8125"
      # Cache in-memory — cada worker aquece os 35 ship IDs rapidamente
      CACHE_TTL_SECONDS: "300"
      CACHE_MAX_SIZE: "200"
      # SWAPI rate limit: ~1000 req/h → cache absorve a carga
      SWAPI_URL: "https://swapi.dev/api"
      RATE_LIMIT_PER_HOUR: "900"
      # Timeouts agressivos para não travar workers
      EXTERNAL_API_TIMEOUT_MS: "3000"
      CIRCUIT_BREAKER_TIMEOUT: "3000"
      CIRCUIT_BREAKER_RESET_TIMEOUT: "30000"
      RETRY_MAX_ATTEMPTS: "2"
      RETRY_DELAY_MS: "100"
    expose:
      - "8000"
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.70"
          memory: 159M
    healthcheck:
      test: ["CMD", "python", "-c",
        "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
