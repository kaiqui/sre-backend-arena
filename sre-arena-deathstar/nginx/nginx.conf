# nginx — tunado para alto throughput no budget de 0.10 CPU / 32MB
# Companion do docker-compose.yml (desenvolvimento/carga local)

user  nginx;
worker_processes  1;          # limitado ao budget de 0.10 CPU
worker_rlimit_nofile  65535;

error_log  /dev/null  crit;   # silencia logs para não consumir I/O durante carga
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    use                 epoll;
    multi_accept        on;
}

http {
    # ── Perf básico ──────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    server_tokens       off;

    # ── Keepalive cliente → nginx ────────────────────────────────
    keepalive_timeout       65s;
    keepalive_requests      100000;

    # ── Logs desligados durante load test ────────────────────────
    access_log              off;

    # ── Buffers ──────────────────────────────────────────────────
    client_header_buffer_size   1k;
    client_max_body_size        1m;

    # ── Upstream: 2 réplicas da app (round-robin do DNS do Docker)─
    upstream app_backend {
        least_conn;
        server  app:8000;     # Docker resolve para as 2 réplicas
        keepalive  256;       # pool de conexões persistentes → evita TCP handshake por req
        keepalive_requests  10000;
        keepalive_timeout   60s;
    }

    server {
        listen       80;
        server_name  _;

        # ── Proxy para a app ─────────────────────────────────────
        location / {
            proxy_pass              http://app_backend;
            proxy_http_version      1.1;
            proxy_set_header        Connection     "";   # keepalive upstream
            proxy_set_header        Host           $host;
            proxy_set_header        X-Real-IP      $remote_addr;
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout   3s;
            proxy_read_timeout      10s;
            proxy_send_timeout      10s;

            proxy_buffering         off;  # reduz latência: entrega chunks imediato
        }

        # ── Health check passthrough ──────────────────────────────
        location /health/live {
            proxy_pass   http://app_backend/health/live;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /health/ready {
            proxy_pass   http://app_backend/health/ready;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
