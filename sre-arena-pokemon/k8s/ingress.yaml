apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pokemon-battle-api
  namespace: sre
spec:
  ingressClassName: nginx
  rules:
  - host: pokemon-api.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pokemon-battle-api
            port:
              number: 80
