apiVersion: apps/v1
kind: Deployment
metadata:
  name: wizard-api
  namespace: sre
  labels:
    app: wizard-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wizard-api
  template:
    metadata:
      labels:
        app: wizard-api
      annotations:
        ad.datadoghq.com/wizard-api.logs: '[{"source": "java", "service": "wizard-api"}]'
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - wizard-api
              topologyKey: kubernetes.io/hostname
      containers:
      - name: wizard-api
        image: wizard-api:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: PORT
          value: "8080"
        - name: DD_AGENT_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: "200m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
